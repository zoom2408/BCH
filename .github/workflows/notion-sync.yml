# ─────────────────────────────────────────────────────────────────
# REUSABLE SKILL: notion-to-json-sync
# ─────────────────────────────────────────────────────────────────
# Fetches Notion databases on a schedule and commits the resulting
# JSON files back to the repo so GitHub Pages always serves fresh data.
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   NOTION_TOKEN    — your Notion integration token
#   TASKS_DB_ID     — Notion database ID (Tasks)
#   CONTENT_DB_ID   — Notion database ID (Content Calendar)
#   ROADMAP_DB_ID   — Notion database ID (Product Roadmap)
#
# Required repo setting:
#   Settings → Actions → General → Workflow permissions → Read and write permissions
# ─────────────────────────────────────────────────────────────────

name: Sync Notion → JSON

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes
  workflow_dispatch:           # allow manual trigger from Actions tab

concurrency:
  group: notion-sync
  cancel-in-progress: false

jobs:
  sync:
    name: Fetch Notion & commit JSON
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to push data files back to repo

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # suppress Node.js 20 deprecation warning

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Notion sync script
        env:
          NOTION_TOKEN:  ${{ secrets.NOTION_TOKEN }}
          TASKS_DB_ID:   ${{ secrets.TASKS_DB_ID }}
          CONTENT_DB_ID: ${{ secrets.CONTENT_DB_ID }}
          ROADMAP_DB_ID: ${{ secrets.ROADMAP_DB_ID }}
        run: python scripts/sync_notion.py

      - name: Commit updated data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tracker/data/
          # Only commit if there are actual changes
          if git diff --cached --quiet; then
            echo "No data changes — nothing to commit."
          else
            git commit -m "chore: sync Notion data"
            git push
          fi
