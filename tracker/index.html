<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BCH Tracker</title>
  <style>
    /* ── Reset & Variables ─────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f5f6fa;
      --surface:   #ffffff;
      --border:    #e2e5ef;
      --text:      #1a1d2e;
      --muted:     #6b7280;
      --accent:    #6366f1;
      --accent-lt: #eef2ff;
      --green:     #10b981;
      --green-lt:  #ecfdf5;
      --amber:     #f59e0b;
      --amber-lt:  #fffbeb;
      --red:       #ef4444;
      --red-lt:    #fef2f2;
      --blue:      #3b82f6;
      --blue-lt:   #eff6ff;
      --gray:      #9ca3af;
      --gray-lt:   #f9fafb;
      --radius:    10px;
      --shadow:    0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,.08);
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    }

    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── Password Gate ─────────────────────────────────────── */
    #gate {
      position: fixed; inset: 0; z-index: 9999;
      background: linear-gradient(135deg, #1a1d2e 0%, #2d2f47 100%);
      display: flex; align-items: center; justify-content: center;
    }
    #gate.hidden { display: none; }
    .gate-card {
      background: #fff; border-radius: 16px; padding: 2.5rem 2rem;
      width: 100%; max-width: 360px; text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
    }
    .gate-logo { font-size: 2rem; font-weight: 800; letter-spacing: -1px; color: var(--accent); margin-bottom: .25rem; }
    .gate-sub  { color: var(--muted); font-size: .875rem; margin-bottom: 1.75rem; }
    .gate-card input {
      width: 100%; padding: .75rem 1rem; border: 1.5px solid var(--border);
      border-radius: var(--radius); font-size: .95rem; font-family: var(--font);
      outline: none; transition: border-color .15s;
      text-align: center; letter-spacing: .15em;
    }
    .gate-card input:focus { border-color: var(--accent); }
    .gate-card button {
      margin-top: .75rem; width: 100%; padding: .75rem;
      background: var(--accent); color: #fff; border: none;
      border-radius: var(--radius); font-size: .95rem; font-weight: 600;
      cursor: pointer; transition: opacity .15s;
    }
    .gate-card button:hover { opacity: .88; }
    #gate-error { margin-top: .6rem; color: var(--red); font-size: .82rem; min-height: 1.1em; }

    /* ── App Shell ─────────────────────────────────────────── */
    #app { display: none; flex-direction: column; min-height: 100vh; }
    #app.visible { display: flex; }

    header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 1.5rem; display: flex; align-items: center; gap: 2rem;
      height: 56px; position: sticky; top: 0; z-index: 100;
      box-shadow: var(--shadow);
    }
    .header-logo { font-size: 1.15rem; font-weight: 800; color: var(--accent); letter-spacing: -.5px; flex-shrink: 0; }
    .header-sync { margin-left: auto; display: flex; align-items: center; gap: .6rem; flex-shrink: 0; }
    .header-sync-time { font-size: .75rem; color: var(--muted); }
    .header-sync-time span { font-weight: 600; }

    /* ── Sync Button ──────────────────────────────────────────── */
    .sync-btn {
      display: flex; align-items: center; gap: .35rem;
      padding: .35rem .7rem; border-radius: 7px;
      border: 1.5px solid var(--border); background: var(--surface);
      color: var(--muted); font-size: .78rem; font-weight: 600;
      cursor: pointer; transition: border-color .15s, color .15s, background .15s;
      font-family: var(--font);
    }
    .sync-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); background: var(--accent-lt); }
    .sync-btn:disabled { opacity: .55; cursor: not-allowed; }
    .sync-icon { font-size: .9rem; display: inline-block; transition: transform .3s; }
    .sync-btn.syncing .sync-icon { animation: spin .7s linear infinite; }

    /* ── Toast ────────────────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(6px);
      background: var(--text); color: #fff; padding: .6rem 1.1rem;
      border-radius: 8px; font-size: .82rem; font-weight: 500;
      box-shadow: var(--shadow-md); opacity: 0;
      transition: opacity .2s, transform .2s; pointer-events: none;
      white-space: nowrap; z-index: 9000;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.success { background: var(--green); }
    #toast.error   { background: var(--red); }

    /* ── DB Tabs ───────────────────────────────────────────── */
    .db-tabs { display: flex; gap: .25rem; }
    .db-tab {
      padding: .4rem .85rem; border-radius: 6px; font-size: .85rem; font-weight: 500;
      cursor: pointer; color: var(--muted); border: none; background: transparent;
      transition: background .15s, color .15s;
    }
    .db-tab:hover { background: var(--bg); color: var(--text); }
    .db-tab.active { background: var(--accent-lt); color: var(--accent); font-weight: 600; }

    /* ── Main ─────────────────────────────────────────────── */
    main { flex: 1; padding: 1.5rem; max-width: 1400px; width: 100%; margin: 0 auto; }

    /* ── View Toolbar ─────────────────────────────────────── */
    .view-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.25rem; gap: 1rem; flex-wrap: wrap;
    }
    .view-title { font-size: 1.1rem; font-weight: 700; }
    .view-switcher { display: flex; gap: .25rem; background: var(--bg); border-radius: 8px; padding: .25rem; }
    .view-btn {
      padding: .35rem .75rem; border-radius: 6px; font-size: .8rem; font-weight: 500;
      cursor: pointer; border: none; background: transparent; color: var(--muted);
      transition: background .15s, color .15s;
    }
    .view-btn.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow); }

    .filter-bar { display: flex; gap: .5rem; flex-wrap: wrap; }
    .filter-select {
      padding: .35rem .65rem; border: 1.5px solid var(--border); border-radius: 7px;
      font-size: .8rem; font-family: var(--font); background: var(--surface);
      color: var(--text); cursor: pointer; outline: none;
    }
    .filter-select:focus { border-color: var(--accent); }

    /* ── Dashboard View ───────────────────────────────────── */
    .stats-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem; margin-bottom: 1.5rem;
    }
    .stat-card {
      background: var(--surface); border-radius: var(--radius); padding: 1.1rem 1.25rem;
      box-shadow: var(--shadow); border: 1px solid var(--border);
    }
    .stat-label { font-size: .73rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: .4rem; }
    .stat-value { font-size: 2rem; font-weight: 800; line-height: 1; }
    .stat-sub   { font-size: .75rem; color: var(--muted); margin-top: .3rem; }
    .stat-card.green .stat-value { color: var(--green); }
    .stat-card.blue  .stat-value { color: var(--blue); }
    .stat-card.amber .stat-value { color: var(--amber); }
    .stat-card.red   .stat-value { color: var(--red); }
    .stat-card.accent .stat-value { color: var(--accent); }

    .progress-bar-wrap { background: var(--bg); border-radius: 99px; height: 8px; overflow: hidden; margin-top: .5rem; }
    .progress-bar-fill { height: 100%; border-radius: 99px; background: var(--green); transition: width .4s ease; }

    .breakdown-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
    }
    .breakdown-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1rem 1.25rem; box-shadow: var(--shadow);
    }
    .breakdown-title { font-size: .78rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: .75rem; }
    .breakdown-row { display: flex; align-items: center; justify-content: space-between; padding: .3rem 0; border-bottom: 1px solid var(--bg); font-size: .85rem; }
    .breakdown-row:last-child { border-bottom: none; }
    .breakdown-name { display: flex; align-items: center; gap: .5rem; }
    .breakdown-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .breakdown-count { font-weight: 700; font-size: .9rem; }

    /* ── Kanban View ──────────────────────────────────────── */
    .kanban-board {
      display: flex; gap: 1rem; overflow-x: auto; padding-bottom: .5rem;
      align-items: flex-start;
    }
    .kanban-board::-webkit-scrollbar { height: 5px; }
    .kanban-board::-webkit-scrollbar-track { background: transparent; }
    .kanban-board::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    .kanban-col {
      background: var(--bg); border-radius: var(--radius); padding: .75rem;
      min-width: 250px; width: 250px; flex-shrink: 0;
    }
    .kanban-col-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: .75rem; padding: 0 .25rem;
    }
    .kanban-col-name { font-size: .82rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; }
    .kanban-col-count {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 99px; font-size: .72rem; font-weight: 700;
      padding: .1rem .45rem; color: var(--muted);
    }
    .kanban-cards { display: flex; flex-direction: column; gap: .5rem; }

    .card {
      background: var(--surface); border-radius: 8px; padding: .8rem .9rem;
      box-shadow: var(--shadow); border: 1px solid var(--border);
      cursor: pointer; transition: box-shadow .15s, transform .1s;
    }
    .card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
    .card-title { font-size: .88rem; font-weight: 600; line-height: 1.3; margin-bottom: .55rem; }
    .card-meta  { display: flex; flex-wrap: wrap; gap: .35rem; align-items: center; }
    .card-link  { text-decoration: none; color: inherit; }

    /* ── Badges ───────────────────────────────────────────── */
    .badge {
      display: inline-flex; align-items: center; gap: .25rem;
      padding: .18rem .5rem; border-radius: 4px;
      font-size: .72rem; font-weight: 600; white-space: nowrap;
    }
    .badge-status-todo       { background: var(--gray-lt);  color: var(--gray); }
    .badge-status-inprogress { background: var(--blue-lt);  color: var(--blue); }
    .badge-status-done       { background: var(--green-lt); color: var(--green); }
    .badge-status-blocked    { background: var(--red-lt);   color: var(--red); }
    .badge-status-review     { background: var(--amber-lt); color: var(--amber); }
    .badge-status-planned    { background: var(--accent-lt);color: var(--accent); }
    .badge-priority-high   { background: var(--red-lt);   color: var(--red); }
    .badge-priority-medium { background: var(--amber-lt); color: var(--amber); }
    .badge-priority-low    { background: var(--green-lt); color: var(--green); }
    .badge-tag { background: var(--accent-lt); color: var(--accent); }

    .card-date { font-size: .73rem; color: var(--muted); margin-top: .4rem; display: flex; align-items: center; gap: .3rem; }
    .card-date.overdue { color: var(--red); font-weight: 600; }
    .card-assignee { font-size: .73rem; color: var(--muted); display: flex; align-items: center; gap: .3rem; }

    /* ── Calendar View ────────────────────────────────────── */
    .cal-nav {
      display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem;
    }
    .cal-title { font-size: 1rem; font-weight: 700; min-width: 140px; }
    .cal-btn {
      width: 32px; height: 32px; border-radius: 8px; border: 1.5px solid var(--border);
      background: var(--surface); cursor: pointer; font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s; color: var(--text);
    }
    .cal-btn:hover { background: var(--bg); }

    .cal-grid {
      display: grid; grid-template-columns: repeat(7, 1fr);
      border: 1px solid var(--border); border-radius: var(--radius);
      overflow: hidden; background: var(--border); gap: 1px;
    }
    .cal-day-header {
      background: var(--surface); text-align: center;
      font-size: .73rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .05em; padding: .5rem;
    }
    .cal-day {
      background: var(--surface); min-height: 90px; padding: .4rem;
      position: relative;
    }
    .cal-day.other-month { background: var(--gray-lt); }
    .cal-day.today { background: var(--accent-lt); }
    .cal-day-num {
      font-size: .78rem; font-weight: 700; color: var(--muted);
      margin-bottom: .3rem; width: 22px; height: 22px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
    }
    .cal-day.today .cal-day-num { background: var(--accent); color: #fff; }
    .cal-events { display: flex; flex-direction: column; gap: .2rem; }
    .cal-event {
      font-size: .68rem; font-weight: 600; padding: .15rem .35rem;
      border-radius: 4px; white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis; cursor: pointer;
      text-decoration: none; display: block;
    }
    .cal-event.status-todo       { background: var(--gray-lt);  color: var(--gray); }
    .cal-event.status-inprogress { background: var(--blue-lt);  color: var(--blue); }
    .cal-event.status-done       { background: var(--green-lt); color: var(--green); }
    .cal-event.status-blocked    { background: var(--red-lt);   color: var(--red); }
    .cal-event.status-review     { background: var(--amber-lt); color: var(--amber); }
    .cal-event.status-planned    { background: var(--accent-lt);color: var(--accent); }
    .cal-more { font-size: .65rem; color: var(--accent); font-weight: 600; cursor: pointer; padding: .1rem .35rem; }

    /* ── Empty state ──────────────────────────────────────── */
    .empty { text-align: center; padding: 3rem 1rem; color: var(--muted); }
    .empty-icon { font-size: 2.5rem; margin-bottom: .5rem; }
    .empty p { font-size: .9rem; }

    /* ── Loading ──────────────────────────────────────────── */
    .loading { text-align: center; padding: 3rem; color: var(--muted); font-size: .9rem; }
    .spinner { display: inline-block; width: 24px; height: 24px; border: 2.5px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; margin-right: .5rem; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Responsive ───────────────────────────────────────── */
    @media (max-width: 640px) {
      header { padding: 0 1rem; gap: 1rem; }
      main { padding: 1rem; }
      .db-tab { padding: .35rem .6rem; font-size: .78rem; }
      .cal-grid { font-size: .7rem; }
      .cal-day { min-height: 60px; }
    }
  </style>
</head>
<body>

<!-- ══ PASSWORD GATE ══════════════════════════════════════════ -->
<div id="gate">
  <div class="gate-card">
    <div class="gate-logo">BCH</div>
    <div class="gate-sub">Enter your passphrase to continue</div>
    <input type="password" id="gate-input" placeholder="••••••••" autocomplete="off" />
    <button onclick="checkPassword()">Unlock</button>
    <div id="gate-error"></div>
  </div>
</div>

<!-- ══ APP ════════════════════════════════════════════════════ -->
<div id="app">
  <header>
    <div class="header-logo">BCH</div>
    <nav class="db-tabs" id="db-tabs">
      <button class="db-tab active" data-db="tasks"   onclick="switchDB('tasks')">Tasks</button>
      <button class="db-tab"        data-db="content" onclick="switchDB('content')">Content</button>
      <button class="db-tab"        data-db="roadmap" onclick="switchDB('roadmap')">Roadmap</button>
    </nav>
    <div class="header-sync">
      <div class="header-sync-time">Synced: <span id="sync-time">—</span></div>
      <button class="sync-btn" id="sync-btn" onclick="triggerSync()" title="Sync Notion → GitHub">
        <span class="sync-icon">↺</span> Sync
      </button>
    </div>
  </header>

  <div id="toast"></div>

  <main id="main-content"></main>
</div>

<!-- loads gitignored token.js when running locally; silently absent on GitHub Pages -->
<script src="../token.js" onerror=""></script>
<script>
/* ══════════════════════════════════════════════════════════════
   CONFIG — edit these
══════════════════════════════════════════════════════════════ */
const CONFIG = {
  password: "bch2026",          // ← change this passphrase
  sessionKey: "bch_unlocked",

  // GitHub Actions sync
  github: {
    owner:    "zoom2408",
    repo:     "BCH",
    workflow: "notion-sync.yml",
    branch:   "main",
  },

  databases: {
    tasks:   { label: "Tasks",    file: "data/tasks.json",   statusField: "status", dateField: "dueDate" },
    content: { label: "Content",  file: "data/content.json", statusField: "status", dateField: "publishDate" },
    roadmap: { label: "Roadmap",  file: "data/roadmap.json", statusField: "status", dateField: "targetDate" },
  },

  // Status → display config (add/remove as needed)
  statusConfig: {
    "To Do":      { label: "To Do",      cls: "todo",        color: "#9ca3af" },
    "In Progress":{ label: "In Progress",cls: "inprogress",  color: "#3b82f6" },
    "In Review":  { label: "In Review",  cls: "review",      color: "#f59e0b" },
    "Done":       { label: "Done",       cls: "done",        color: "#10b981" },
    "Blocked":    { label: "Blocked",    cls: "blocked",     color: "#ef4444" },
    "Planned":    { label: "Planned",    cls: "planned",     color: "#6366f1" },
    "Published":  { label: "Published",  cls: "done",        color: "#10b981" },
    "Draft":      { label: "Draft",      cls: "todo",        color: "#9ca3af" },
    "Scheduled":  { label: "Scheduled",  cls: "planned",     color: "#6366f1" },
  },

  kanbanOrder: ["To Do","Draft","Planned","In Progress","In Review","Blocked","Done","Published","Scheduled"],
};

/* ══════════════════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════════════════ */
const state = {
  currentDB: "tasks",
  currentView: "dashboard",   // dashboard | kanban | calendar
  data: {},                   // { tasks: {...}, content: {...}, roadmap: {...} }
  calMonth: new Date().getMonth(),
  calYear:  new Date().getFullYear(),
  filters: { status: "", priority: "" },
};

/* ══════════════════════════════════════════════════════════════
   PASSWORD GATE
══════════════════════════════════════════════════════════════ */
function checkPassword() {
  const val = document.getElementById("gate-input").value;
  if (val === CONFIG.password) {
    sessionStorage.setItem(CONFIG.sessionKey, "1");
    document.getElementById("gate").classList.add("hidden");
    document.getElementById("app").classList.add("visible");
    loadAllData();
  } else {
    document.getElementById("gate-error").textContent = "Incorrect passphrase. Try again.";
    document.getElementById("gate-input").value = "";
  }
}

document.getElementById("gate-input").addEventListener("keydown", e => {
  if (e.key === "Enter") checkPassword();
  document.getElementById("gate-error").textContent = "";
});

// Auto-unlock if already authenticated this session
if (sessionStorage.getItem(CONFIG.sessionKey) === "1") {
  document.getElementById("gate").classList.add("hidden");
  document.getElementById("app").classList.add("visible");
  loadAllData();
}

/* ══════════════════════════════════════════════════════════════
   DATA LOADING
══════════════════════════════════════════════════════════════ */
async function loadAllData() {
  renderLoading();
  const keys = Object.keys(CONFIG.databases);
  await Promise.all(keys.map(async key => {
    try {
      const res = await fetch(CONFIG.databases[key].file + "?t=" + Date.now());
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      state.data[key] = await res.json();
    } catch (e) {
      state.data[key] = { lastSync: null, items: [] };
      console.warn(`Failed to load ${key}:`, e);
    }
  }));
  updateSyncTime();
  render();
}

function updateSyncTime() {
  const db = state.data[state.currentDB];
  const el = document.getElementById("sync-time");
  if (db && db.lastSync) {
    const d = new Date(db.lastSync);
    el.textContent = d.toLocaleString([], { month:"short", day:"numeric", hour:"2-digit", minute:"2-digit" });
  } else {
    el.textContent = "never";
  }
}

/* ══════════════════════════════════════════════════════════════
   ROUTING
══════════════════════════════════════════════════════════════ */
function switchDB(db) {
  state.currentDB = db;
  state.filters = { status: "", priority: "" };
  document.querySelectorAll(".db-tab").forEach(t => t.classList.toggle("active", t.dataset.db === db));
  updateSyncTime();
  render();
}

function switchView(view) {
  state.currentView = view;
  render();
}

/* ══════════════════════════════════════════════════════════════
   FILTERS
══════════════════════════════════════════════════════════════ */
function getFilteredItems() {
  const items = (state.data[state.currentDB]?.items || []);
  return items.filter(item => {
    if (state.filters.status    && item.status   !== state.filters.status)   return false;
    if (state.filters.priority  && item.priority !== state.filters.priority) return false;
    return true;
  });
}

function onFilterChange(field, val) {
  state.filters[field] = val;
  render();
}

/* ══════════════════════════════════════════════════════════════
   RENDER ORCHESTRATOR
══════════════════════════════════════════════════════════════ */
function renderLoading() {
  document.getElementById("main-content").innerHTML =
    `<div class="loading"><span class="spinner"></span> Loading data…</div>`;
}

function render() {
  const cfg = CONFIG.databases[state.currentDB];
  const items = getFilteredItems();
  const allItems = state.data[state.currentDB]?.items || [];

  const html = `
    <div class="view-toolbar">
      <div class="view-title">${cfg.label}</div>
      <div style="display:flex;gap:.75rem;align-items:center;flex-wrap:wrap;">
        ${renderFilters(allItems)}
        <div class="view-switcher">
          <button class="view-btn ${state.currentView==='dashboard'?'active':''}" onclick="switchView('dashboard')">📊 Dashboard</button>
          <button class="view-btn ${state.currentView==='kanban'?'active':''}"    onclick="switchView('kanban')">⬜ Kanban</button>
          <button class="view-btn ${state.currentView==='calendar'?'active':''}"  onclick="switchView('calendar')">📅 Calendar</button>
        </div>
      </div>
    </div>
    ${state.currentView === 'dashboard' ? renderDashboard(items, allItems) :
      state.currentView === 'kanban'    ? renderKanban(items) :
                                          renderCalendar(items)}
  `;
  document.getElementById("main-content").innerHTML = html;
}

/* ══════════════════════════════════════════════════════════════
   FILTERS BAR
══════════════════════════════════════════════════════════════ */
function renderFilters(items) {
  const statuses   = [...new Set(items.map(i => i.status).filter(Boolean))];
  const priorities = [...new Set(items.map(i => i.priority).filter(Boolean))];

  const statusOpts = statuses.map(s =>
    `<option value="${s}" ${state.filters.status===s?'selected':''}>${s}</option>`).join('');
  const prioOpts = priorities.map(p =>
    `<option value="${p}" ${state.filters.priority===p?'selected':''}>${p}</option>`).join('');

  return `
    <div class="filter-bar">
      <select class="filter-select" onchange="onFilterChange('status',this.value)">
        <option value="">All Statuses</option>${statusOpts}
      </select>
      ${priorities.length ? `
      <select class="filter-select" onchange="onFilterChange('priority',this.value)">
        <option value="">All Priorities</option>${prioOpts}
      </select>` : ''}
    </div>
  `;
}

/* ══════════════════════════════════════════════════════════════
   DASHBOARD VIEW
══════════════════════════════════════════════════════════════ */
function renderDashboard(items, allItems) {
  const total    = allItems.length;
  const done     = allItems.filter(i => ["Done","Published"].includes(i.status)).length;
  const inProg   = allItems.filter(i => i.status === "In Progress").length;
  const blocked  = allItems.filter(i => i.status === "Blocked").length;
  const pct      = total ? Math.round(done / total * 100) : 0;
  const today    = new Date(); today.setHours(0,0,0,0);
  const dateField= CONFIG.databases[state.currentDB].dateField;
  const overdue  = allItems.filter(i =>
    i[dateField] && new Date(i[dateField]) < today && !["Done","Published"].includes(i.status)
  ).length;

  // Status breakdown
  const statusCounts = {};
  allItems.forEach(i => { statusCounts[i.status] = (statusCounts[i.status]||0)+1; });
  // Priority breakdown
  const prioCounts = {};
  allItems.forEach(i => { if(i.priority) prioCounts[i.priority] = (prioCounts[i.priority]||0)+1; });
  // Tag breakdown
  const tagCounts = {};
  allItems.forEach(i => (i.tags||[]).forEach(t => { tagCounts[t] = (tagCounts[t]||0)+1; }));

  const statusRows = Object.entries(statusCounts).sort((a,b)=>b[1]-a[1])
    .map(([s,c]) => {
      const sc = CONFIG.statusConfig[s] || { color: "#9ca3af" };
      return `<div class="breakdown-row">
        <div class="breakdown-name"><div class="breakdown-dot" style="background:${sc.color}"></div>${s}</div>
        <span class="breakdown-count">${c}</span>
      </div>`;
    }).join('');

  const prioRows = Object.entries(prioCounts).sort((a,b)=>b[1]-a[1])
    .map(([p,c]) => {
      const colors = { High:"#ef4444", Medium:"#f59e0b", Low:"#10b981" };
      return `<div class="breakdown-row">
        <div class="breakdown-name"><div class="breakdown-dot" style="background:${colors[p]||'#9ca3af'}"></div>${p}</div>
        <span class="breakdown-count">${c}</span>
      </div>`;
    }).join('');

  const tagRows = Object.entries(tagCounts).sort((a,b)=>b[1]-a[1]).slice(0,6)
    .map(([t,c]) => `<div class="breakdown-row">
      <div class="breakdown-name"><div class="breakdown-dot" style="background:#6366f1"></div>${t}</div>
      <span class="breakdown-count">${c}</span>
    </div>`).join('');

  return `
    <div class="stats-grid">
      <div class="stat-card accent">
        <div class="stat-label">Total</div>
        <div class="stat-value">${total}</div>
        <div class="stat-sub">items</div>
      </div>
      <div class="stat-card green">
        <div class="stat-label">Done</div>
        <div class="stat-value">${done}</div>
        <div class="stat-sub">${pct}% complete</div>
        <div class="progress-bar-wrap" style="margin-top:.5rem"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="stat-card blue">
        <div class="stat-label">In Progress</div>
        <div class="stat-value">${inProg}</div>
        <div class="stat-sub">active</div>
      </div>
      <div class="stat-card red">
        <div class="stat-label">Overdue</div>
        <div class="stat-value">${overdue}</div>
        <div class="stat-sub">past due date</div>
      </div>
      ${blocked ? `<div class="stat-card red">
        <div class="stat-label">Blocked</div>
        <div class="stat-value">${blocked}</div>
        <div class="stat-sub">need attention</div>
      </div>` : ''}
    </div>
    <div class="breakdown-grid">
      ${statusRows ? `<div class="breakdown-card">
        <div class="breakdown-title">By Status</div>${statusRows}
      </div>` : ''}
      ${prioRows ? `<div class="breakdown-card">
        <div class="breakdown-title">By Priority</div>${prioRows}
      </div>` : ''}
      ${tagRows ? `<div class="breakdown-card">
        <div class="breakdown-title">Top Tags</div>${tagRows}
      </div>` : ''}
    </div>
  `;
}

/* ══════════════════════════════════════════════════════════════
   KANBAN VIEW
══════════════════════════════════════════════════════════════ */
function renderKanban(items) {
  const allStatuses = [...new Set(items.map(i => i.status).filter(Boolean))];
  const ordered = CONFIG.kanbanOrder.filter(s => allStatuses.includes(s));
  const rest    = allStatuses.filter(s => !CONFIG.kanbanOrder.includes(s));
  const cols    = [...ordered, ...rest];

  if (!cols.length) return `<div class="empty"><div class="empty-icon">📭</div><p>No items found</p></div>`;

  const colsHtml = cols.map(status => {
    const cards = items.filter(i => i.status === status);
    const sc    = CONFIG.statusConfig[status] || { color: "#9ca3af", cls: "todo" };
    return `
      <div class="kanban-col">
        <div class="kanban-col-header">
          <span class="kanban-col-name" style="color:${sc.color}">${status}</span>
          <span class="kanban-col-count">${cards.length}</span>
        </div>
        <div class="kanban-cards">${cards.map(c => renderCard(c)).join('') || '<div style="font-size:.78rem;color:var(--muted);text-align:center;padding:.5rem">Empty</div>'}</div>
      </div>
    `;
  }).join('');

  return `<div class="kanban-board">${colsHtml}</div>`;
}

function renderCard(item) {
  const sc       = CONFIG.statusConfig[item.status] || { cls: "todo" };
  const dateField= CONFIG.databases[state.currentDB].dateField;
  const date     = item[dateField];
  const today    = new Date(); today.setHours(0,0,0,0);
  const isOverdue= date && new Date(date) < today && !["Done","Published"].includes(item.status);
  const tags     = (item.tags || []).slice(0,2).map(t => `<span class="badge badge-tag">${t}</span>`).join('');
  const prio     = item.priority ? `<span class="badge badge-priority-${item.priority.toLowerCase()}">${item.priority}</span>` : '';
  const link     = item.url ? ` onclick="window.open('${item.url}','_blank')"` : '';

  return `
    <div class="card"${link}>
      <div class="card-title">${escHtml(item.title || 'Untitled')}</div>
      <div class="card-meta">
        <span class="badge badge-status-${sc.cls}">${item.status}</span>
        ${prio}${tags}
      </div>
      ${date ? `<div class="card-date${isOverdue?' overdue':''}">📅 ${fmtDate(date)}${isOverdue?' · Overdue':''}</div>` : ''}
      ${item.assignee ? `<div class="card-assignee">👤 ${escHtml(item.assignee)}</div>` : ''}
    </div>
  `;
}

/* ══════════════════════════════════════════════════════════════
   CALENDAR VIEW
══════════════════════════════════════════════════════════════ */
function renderCalendar(items) {
  const dateField = CONFIG.databases[state.currentDB].dateField;
  const year  = state.calYear;
  const month = state.calMonth;
  const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const days   = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

  // Build date → items map
  const byDate = {};
  items.forEach(item => {
    const d = item[dateField];
    if (!d) return;
    const key = d.split("T")[0];
    if (!byDate[key]) byDate[key] = [];
    byDate[key].push(item);
  });

  const firstDay   = new Date(year, month, 1).getDay();
  const daysInMon  = new Date(year, month + 1, 0).getDate();
  const daysInPrev = new Date(year, month, 0).getDate();
  const todayStr   = new Date().toISOString().split("T")[0];

  const headerCells = days.map(d => `<div class="cal-day-header">${d}</div>`).join('');

  let cells = '';
  // Prev month padding
  for (let i = 0; i < firstDay; i++) {
    const d = daysInPrev - firstDay + 1 + i;
    cells += `<div class="cal-day other-month"><div class="cal-day-num">${d}</div></div>`;
  }
  // Current month
  for (let d = 1; d <= daysInMon; d++) {
    const dateStr  = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday  = dateStr === todayStr;
    const dayItems = byDate[dateStr] || [];
    const visible  = dayItems.slice(0, 3);
    const more     = dayItems.length - visible.length;

    const events = visible.map(item => {
      const sc  = CONFIG.statusConfig[item.status] || { cls: "todo" };
      const url = item.url ? ` href="${item.url}" target="_blank"` : '';
      return `<a class="cal-event status-${sc.cls}"${url} title="${escHtml(item.title||'')}">${escHtml(item.title||'Untitled')}</a>`;
    }).join('');

    cells += `
      <div class="cal-day${isToday?' today':''}">
        <div class="cal-day-num">${d}</div>
        <div class="cal-events">
          ${events}
          ${more > 0 ? `<div class="cal-more">+${more} more</div>` : ''}
        </div>
      </div>`;
  }
  // Next month padding
  const total = firstDay + daysInMon;
  const remaining = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (let d = 1; d <= remaining; d++) {
    cells += `<div class="cal-day other-month"><div class="cal-day-num">${d}</div></div>`;
  }

  return `
    <div class="cal-nav">
      <button class="cal-btn" onclick="calNav(-1)">‹</button>
      <div class="cal-title">${months[month]} ${year}</div>
      <button class="cal-btn" onclick="calNav(1)">›</button>
      <button class="cal-btn" style="font-size:.78rem;width:auto;padding:0 .6rem;" onclick="calToday()">Today</button>
    </div>
    <div class="cal-grid">
      ${headerCells}
      ${cells}
    </div>
  `;
}

function calNav(dir) {
  state.calMonth += dir;
  if (state.calMonth > 11) { state.calMonth = 0;  state.calYear++; }
  if (state.calMonth < 0)  { state.calMonth = 11; state.calYear--; }
  render();
}
function calToday() {
  const now = new Date();
  state.calMonth = now.getMonth();
  state.calYear  = now.getFullYear();
  render();
}

/* ══════════════════════════════════════════════════════════════
   UTILS
══════════════════════════════════════════════════════════════ */
function fmtDate(str) {
  if (!str) return '';
  const d = new Date(str + (str.includes('T') ? '' : 'T00:00:00'));
  return d.toLocaleDateString([], { month: "short", day: "numeric", year: "numeric" });
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ══════════════════════════════════════════════════════════════
   SYNC — triggers GitHub Actions workflow_dispatch
══════════════════════════════════════════════════════════════ */
function getGHToken() {
  // 1. Local dev: gitignored token.js sets window.BCH_GH_TOKEN
  // 2. Deployed: persisted in localStorage after first entry
  return (typeof window.BCH_GH_TOKEN !== "undefined" && window.BCH_GH_TOKEN)
    || localStorage.getItem("bch_gh_token")
    || "";
}

async function triggerSync() {
  const { owner, repo, workflow, branch } = CONFIG.github;

  let token = getGHToken();
  if (!token) {
    const input = prompt("Enter GitHub PAT (needs workflow scope):");
    if (!input) return;
    token = input.trim();
    localStorage.setItem("bch_gh_token", token);
  }

  const btn = document.getElementById("sync-btn");
  btn.disabled = true;
  btn.classList.add("syncing");

  try {
    const res = await fetch(
      `https://api.github.com/repos/${owner}/${repo}/actions/workflows/${workflow}/dispatches`,
      {
        method: "POST",
        headers: {
          "Authorization": `Bearer ${token}`,
          "Accept": "application/vnd.github+json",
          "X-GitHub-Api-Version": "2022-11-28",
          "Content-Type": "application/json",
        },
        body: JSON.stringify({ ref: branch }),
      }
    );

    if (res.status === 204) {
      showToast("Sync triggered — data will refresh in ~1 min", "success");
      setTimeout(() => loadAllData(), 75000);
    } else {
      const data = await res.json().catch(() => ({}));
      // If 401/403, clear stored token so user can re-enter
      if (res.status === 401 || res.status === 403) {
        localStorage.removeItem("bch_gh_token");
      }
      showToast(`GitHub error: ${data.message || res.status}`, "error");
    }
  } catch (e) {
    showToast("Network error — check console", "error");
    console.error(e);
  } finally {
    btn.disabled = false;
    btn.classList.remove("syncing");
  }
}

/* ── Toast helper ──────────────────────────────────────────── */
let _toastTimer;
function showToast(msg, type = "") {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "show" + (type ? ` ${type}` : "");
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { el.className = ""; }, 3500);
}
</script>
