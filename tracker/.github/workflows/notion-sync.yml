name: Sync Notion → JSON + Deploy

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

concurrency:
  group: notion-sync
  cancel-in-progress: false

jobs:
  sync:
    name: Fetch Notion & commit JSON
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    outputs:
      changed: ${{ steps.commit.outputs.changed }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Notion sync script
        env:
          NOTION_TOKEN:  ${{ secrets.NOTION_TOKEN }}
          TASKS_DB_ID:   ${{ secrets.TASKS_DB_ID }}
          CONTENT_DB_ID: ${{ secrets.CONTENT_DB_ID }}
          ROADMAP_DB_ID: ${{ secrets.ROADMAP_DB_ID }}
        run: python scripts/sync_notion.py

      - name: Commit updated data files
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tracker/data/
          if git diff --cached --quiet; then
            echo "No data changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: sync Notion data"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: Deploy to GitHub Pages
    needs: sync
    if: ${{ needs.sync.outputs.changed == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo (after data commit)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
